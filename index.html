    <style type="text/css">
/* Launcher page chrome only — the VESpost app UI is styled by vespost.css */
body {
    background-color: #000000;
    color: #9f9f9f;
    font-family: Verdana, sans-serif;
    padding: 24px;
}
h1 {
    font-size: 48pt;
    color: #5f9fbf;
    margin: 16px 0;
}
body > p {
    font-size: 14pt;
    color: #5fbf9f;
}
body > p.links {
    font-size: 11pt;
    color: #9f9f9f;
}
body > p.links a,
body > p.links a:visited {
    color: #9f9f9f;
}
body > button {
    display: block;
    margin: 32px 8px 8px 8px;
    background-color: #3f3f3f;
    color: #9fbfdf;
    padding: 12px 24px;
    border-radius: 32px;
    font-size: 24pt;
    cursor: pointer;
    border: none;
}
body > button:hover {
    background-color: #7f7f7f;
}

    font-size: 12pt;
}
#status .error {
    color: #df5f5f;
}
    </style>

<body>

<h1>VESpost</h1>
<p>End-to-end encrypted collaborative sticky notes &mdash; a libVES.subtle.js demo.</p>
<p class="links"><a href="https://github.com/vesvault/vespost">VESpost on GitHub</a> | <a href="https://github.com/vesvault/libVES">libVES</a></p>

<button type="button" onclick="return demo_unlock();">Launch VESpost</button>
<br/>
<br/>
<div id="status"></div>

<script type="text/javascript">
var ves = libVES.subtle('demo');

function demo_unlock(unlock) {
    demo_status('Unlocking...');
    ves.unlock().then((ves) => (new VESpost(ves, demo_lock), demo_status('Unlocked: ' + ves.short()))).catch((er) => demo_status('<span class="error">' + er + '</span>'));
    return false;
}
function demo_lock() {
    demo_status('Locking...');
    ves.lock().then(() => demo_status('Locked.')).catch((er) => demo_status('<span class="error">' + er + '</span>'));
    return false;
}
function demo_status(msg) {
    document.getElementById('status').innerHTML = msg;
}

ves.unlocked().then((ok) => (ok && demo_unlock()));
</script>

</body>
